name: DeepEval

on:
  workflow_dispatch:

jobs:
  deepeval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Verify OpenAI API key
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set."
            exit 1
          fi

      - name: Run classifier evaluation
        run: PYTHONPATH=src uv run deepeval test run deepeval/test_classifier.py -v
        continue-on-error: true

      - name: Run reply quality evaluation
        run: PYTHONPATH=src uv run deepeval test run deepeval/test_reply_quality.py -v
        continue-on-error: true

      - name: Run security evaluation
        run: PYTHONPATH=src uv run deepeval test run deepeval/test_security.py -v
        continue-on-error: true
