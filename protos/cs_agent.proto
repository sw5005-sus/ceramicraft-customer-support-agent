syntax = "proto3";

package ceramicraft.cs_agent;

message ChatRequest {
    string message = 1;
    string thread_id = 2;       // optional; empty string = new conversation
    // Auth token passed via gRPC metadata key "authorization" (Bearer scheme)
}

message ChatResponse {
    string reply = 1;
    string thread_id = 2;
}

message ResetRequest {
    string thread_id = 1;
}

message ResetResponse {
    string status = 1;
    string message = 2;
}

service CustomerSupportAgent {
    rpc Chat (ChatRequest) returns (ChatResponse);
    rpc Reset (ResetRequest) returns (ResetResponse);
}
